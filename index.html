<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Maanyam's Website</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#6a11cb,#2575fc);
    color:white;
    text-align:center;
    padding:50px;
}

h1{
    font-size:60px;
}

p{
    font-size:22px;
}

.card{
    background:rgba(255,255,255,0.15);
    padding:30px;
    border-radius:20px;
    display:inline-block;
    margin-top:40px;
    backdrop-filter: blur(10px);
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:white;
    color:#2575fc;
    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<h1>Welcome to Maanyam's Website 🚀</h1>

<div class="card">
<p>This is my first website hosted online!</p>
<p>Built with HTML and published using GitHub Pages.</p>

<button onclick="alert('Thanks for visiting my website!')">
Click Me
</button>
</div>

</body>
</html>
